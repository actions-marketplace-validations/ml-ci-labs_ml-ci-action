name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build release image
        run: docker build -t ml-ci-action:release .

  publish-ghcr:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.vars.outputs.image_ref }}
      image-version: ${{ steps.vars.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive image tags
        id: vars
        run: |
          version="${GITHUB_REF_NAME}"
          major="$(printf '%s' "$version" | cut -d. -f1)"
          minor="$(printf '%s' "$version" | cut -d. -f1-2)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"
          echo "minor=$minor" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${GITHUB_REPOSITORY}:${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.minor }}
            ghcr.io/${{ github.repository }}:${{ steps.vars.outputs.major }}
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}

  smoke-published-image:
    needs: publish-ghcr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: docker pull "${{ needs.publish-ghcr.outputs.image-ref }}"

      - name: Smoke test published image
        run: |
          mkdir -p .tmp
          : > .tmp/github_output.txt

          docker run --rm \
            -e INPUT_METRICS_FILE=tests/fixtures/current_metrics.json \
            -e INPUT_COMMENT_ON_PR=false \
            -e INPUT_FAIL_ON_REGRESSION=true \
            -e GITHUB_WORKSPACE=/work \
            -e GITHUB_OUTPUT=/tmp/ml-ci/github_output.txt \
            -v "$PWD:/work" \
            -v "$PWD/.tmp:/tmp/ml-ci" \
            "${{ needs.publish-ghcr.outputs.image-ref }}"

          grep -q "validation-passed=true" .tmp/github_output.txt
